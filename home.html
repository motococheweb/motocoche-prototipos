  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

fff;font-weight:600;font-size:13.5px;padding:13px 22px;border-radius:999px;box-shadow:0 14px 34px rgba(0,0,0,.32);display:flex;align-items:center;gap:9px;max-width:90vw\"><span style=\"color:var(--orange,#FF7F00);font-size:15px\">✓<\u002Fspan>{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <a href=\"#\" style=\"position:fixed;right:24px;bottom:24px;z-index:60;display:flex;align-items:center;gap:10px;background:#25D366;color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:14px 19px;border-radius:999px;box-shadow:0 12px 28px rgba(37,211,102,.5)\"><span style=\"font-size:18px\">✆<\u002Fspan> ¿Hablamos?<\u002Fa>\n\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:2800},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#F2660A&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Marca&quot;,&quot;options&quot;:[&quot;#FF7F00&quot;,&quot;#FF6A1A&quot;,&quot;#F2660A&quot;]},&quot;defaultTab&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Por vehículo&quot;,&quot;options&quot;:[&quot;Por vehículo&quot;,&quot;Por referencia&quot;,&quot;Por matrícula&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Buscador&quot;},&quot;heroSeal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Hero&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    tab: \"veh\", sinIva: true,\n    marca: \"\", modelo: \"\", motor: \"\", pieza: \"\",\n    query: \"\", refQuery: \"\", plate: \"\",\n    activeVehicle: null, searchMode: null,\n    searched: false, loading: false,\n    filterLado: \"all\", filterCat: \"all\", sort: \"rel\",\n    cart: 0, toast: null\n  };\n\n  componentDidMount() {\n    const map = { \"Por vehículo\": \"veh\", \"Por referencia\": \"ref\", \"Por matrícula\": \"mat\" };\n    const init = map[this.props.defaultTab];\n    if (init && init !== this.state.tab) this.setState({ tab: init });\n  }\n  componentWillUnmount() { clearTimeout(this._t); clearTimeout(this._tt); }\n\n  scrollToResults() {\n    setTimeout(() => {\n      const el = document.getElementById(\"resultados\");\n      if (!el) return;\n      const top = Math.max(0, el.getBoundingClientRect().top + window.scrollY - 72);\n      window.scrollTo(0, top);\n    }, 90);\n  }\n  beginSearch(patch) {\n    this.setState(Object.assign({ searched: true, loading: true }, patch));\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ loading: false }), 720);\n    this.scrollToResults();\n  }\n  searchVehiculo() {\n    if (!this.state.marca) {\n      this.beginSearch({ activeVehicle: null, searchMode: \"all\", filterCat: this.state.pieza || \"all\", filterLado: \"all\", query: \"\", refQuery: \"\" });\n      return;\n    }\n    const motor = this.state.motor ? \" · \" + this.state.motor.replace(/^\\d{4} · /, \"\") : \"\";\n    const v = [this.state.marca, this.state.modelo].filter(Boolean).join(\" \") + motor;\n    this.beginSearch({ activeVehicle: v, searchMode: \"veh\", filterCat: this.state.pieza || \"all\", filterLado: \"all\", query: \"\", refQuery: \"\" });\n  }\n  searchRef() { this.beginSearch({ activeVehicle: null, searchMode: \"ref\", filterCat: \"all\", filterLado: \"all\" }); }\n  identifyPlate() {\n    this.beginSearch({ marca: \"SEAT\", modelo: \"León\", motor: \"2022 · 1.5 TSI 130cv\", activeVehicle: \"SEAT León · 1.5 TSI 130cv\", searchMode: \"veh\", filterCat: \"all\", filterLado: \"all\", query: \"\", refQuery: \"\" });\n  }\n  searchHeader() { this.beginSearch({ searchMode: \"text\", filterCat: \"all\", filterLado: \"all\", refQuery: \"\" }); }\n  searchText(term) { this.beginSearch({ query: term, searchMode: \"text\", filterCat: \"all\", filterLado: \"all\", refQuery: \"\" }); }\n  searchAll() { this.beginSearch({ searchMode: \"all\", filterCat: \"all\", filterLado: \"all\", query: \"\", refQuery: \"\" }); }\n  clickCategory(name) { this.beginSearch({ filterCat: name, searchMode: \"cat\", query: \"\", refQuery: \"\", filterLado: \"all\" }); }\n  clearVehicle() {\n    this.setState({ activeVehicle: null, searched: false, searchMode: null, marca: \"\", modelo: \"\", motor: \"\", pieza: \"\", query: \"\", refQuery: \"\", filterCat: \"all\", filterLado: \"all\" });\n    this.scrollToResults();\n  }\n  resetFilters() { this.setState({ filterCat: \"all\", filterLado: \"all\" }); }\n  flash(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._tt);\n    this._tt = setTimeout(() => this.setState({ toast: null }), 1900);\n  }\n  addToCart(p) {\n    this.setState((s) => ({ cart: s.cart + 1, toast: \"Añadido al carrito: \" + p.name }));\n    clearTimeout(this._tt);\n    this._tt = setTimeout(() => this.setState({ toast: null }), 1900);\n  }\n\n  renderVals() {\n    const accent = this.props.accent ?? \"#FF7F00\";\n    const heroSeal = this.props.heroSeal ?? true;\n    const S = this.state;\n    const tab = S.tab;\n\n    const tabDefs = [\n      { id: \"veh\", idx: \"01\", label: \"Por vehículo\" },\n      { id: \"ref\", idx: \"02\", label: \"Por referencia\" },\n      { id: \"mat\", idx: \"03\", label: \"Por matrícula\" }\n    ];\n    const tabs = tabDefs.map((t) => ({\n      label: t.label, idx: t.idx,\n      set: () => this.setState({ tab: t.id }),\n      bg: tab === t.id ? \"#FFF4E8\" : \"#FFFFFF\",\n      fg: tab === t.id ? \"#B5460E\" : \"#6B6B6B\",\n      num: tab === t.id ? \"#B5460E\" : \"#B0B0B0\",\n      bd: tab === t.id ? accent : \"transparent\"\n    }));\n\n    const navpills = [\"Recambios\", \"Campa\", \"Conócenos\", \"Talleres\", \"Embalaje\", \"Contacto\"];\n    const marcas = [\"SEAT\", \"Renault\", \"Peugeot\", \"Volkswagen\", \"Audi\", \"BMW\", \"Mercedes-Benz\", \"Opel\", \"Ford\", \"Toyota\", \"Citroën\", \"Kia\", \"Dacia\", \"Honda\", \"Yamaha\"];\n    const modelos = [\"León\", \"Ibiza\", \"Ateca\", \"Arona\", \"Tarraco\", \"Toledo\"];\n    const motores = [\"2024 · 2.0 TDI 150cv\", \"2022 · 1.5 TSI 130cv\", \"2021 · 1.0 TSI 110cv\", \"2019 · 1.6 TDI 115cv\"];\n\n    const categoriesRaw = [\n      { name: \"Accesorios\", tag: \"accesorios\" }, { name: \"Alumbrado\", tag: \"alumbrado\" },\n      { name: \"Cambio y Embrague\", tag: \"embrague\" }, { name: \"Carrocería Frontal\", tag: \"frontal\" },\n      { name: \"Carrocería Lateral\", tag: \"lateral\" }, { name: \"Carrocería Trasera\", tag: \"trasera\" },\n      { name: \"Climatización\", tag: \"clima\" }, { name: \"Electrónica\", tag: \"electronica\" },\n      { name: \"Interior\", tag: \"interior\" }, { name: \"Motor, admisión y escape\", tag: \"motor\" },\n      { name: \"Suspensión y Frenos\", tag: \"frenos\" }, { name: \"Dirección y Transmisión\", tag: \"transmision\" },\n      { name: \"Llantas\", tag: \"llantas\" }\n    ];\n    const categories = categoriesRaw.map((c) => ({\n      name: c.name, tag: c.tag,\n      onClick: (e) => { if (e && e.preventDefault) e.preventDefault(); this.clickCategory(c.name); }\n    }));\n    const catNames = categoriesRaw.map((c) => c.name);\n\n    const chipTerms = [\"Faros\", \"Paragolpes\", \"Puertas\", \"Aletas\", \"Motores\", \"Cajas de cambio\"];\n    const chips = chipTerms.map((term) => ({\n      label: term,\n      onClick: (e) => { if (e && e.preventDefault) e.preventDefault(); this.searchText(term); }\n    }));\n\n    const catalog = [\n      { name: \"Faro delantero derecho LED\", cat: \"Alumbrado\", lado: \"Derecho\", oe: \"8U0941004\", base: 145, place: \"Granada\" },\n      { name: \"Faro delantero izquierdo LED\", cat: \"Alumbrado\", lado: \"Izquierdo\", oe: \"8U0941003\", base: 145, place: \"Granada\" },\n      { name: \"Paragolpes delantero\", cat: \"Carrocería Frontal\", lado: \"\", oe: \"620221234R\", base: 120, place: \"Jaén\" },\n      { name: \"Retrovisor izquierdo eléctrico\", cat: \"Carrocería Lateral\", lado: \"Izquierdo\", oe: \"5F1857507\", base: 78, place: \"Granada\" },\n      { name: \"Retrovisor derecho eléctrico\", cat: \"Carrocería Lateral\", lado: \"Derecho\", oe: \"5F1857508\", base: 78, place: \"Granada\" },\n      { name: \"Puerta delantera derecha\", cat: \"Carrocería Lateral\", lado: \"Derecho\", oe: \"5F0831056\", base: 210, place: \"Jaén\" },\n      { name: \"Caja de cambios manual 6 vel.\", cat: \"Cambio y Embrague\", lado: \"\", oe: \"0CW300041\", base: 640, place: \"Granada\" },\n      { name: \"Compresor aire acondicionado\", cat: \"Climatización\", lado: \"\", oe: \"5Q0816803\", base: 165, place: \"Granada\" },\n      { name: \"Alternador 140A\", cat: \"Electrónica\", lado: \"\", oe: \"04L903023\", base: 130, place: \"Jaén\" },\n      { name: \"Amortiguador delantero\", cat: \"Suspensión y Frenos\", lado: \"\", oe: \"5Q0413031\", base: 95, place: \"Granada\" }\n    ];\n\n    const sinIva = S.sinIva;\n    const fmt = (base) => { const v = sinIva ? Math.round(base / 1.21) : base; return v.toLocaleString(\"es-ES\") + \" €\"; };\n    const ivaNote = sinIva ? \"sin IVA\" : \"IVA incl.\";\n\n    let results = catalog.slice();\n    const mode = S.searchMode;\n    const q = (S.query || \"\").trim().toLowerCase();\n    const rq = (S.refQuery || \"\").trim().toLowerCase();\n    if (mode === \"ref\" && rq) results = results.filter((p) => (p.oe + \" \" + p.name).toLowerCase().includes(rq));\n    if (mode === \"text\" && q) results = results.filter((p) => p.name.toLowerCase().includes(q));\n    if (S.filterCat !== \"all\") results = results.filter((p) => p.cat === S.filterCat);\n    if (S.filterLado === \"izq\") results = results.filter((p) => p.lado === \"Izquierdo\");\n    if (S.filterLado === \"der\") results = results.filter((p) => p.lado === \"Derecho\");\n    if (S.sort === \"asc\") results.sort((a, b) => a.base - b.base);\n    if (S.sort === \"desc\") results.sort((a, b) => b.base - a.base);\n\n    const searched = S.searched;\n    const loading = S.loading;\n    const hasVehicle = !!S.activeVehicle;\n    const source = searched ? results : catalog.slice(0, 4);\n    const visibleParts = source.map((p) => ({\n      name: p.name, sub: p.cat, oe: p.oe,\n      compatible: hasVehicle,\n      chips: [\"Usado\"].concat(p.lado ? [p.lado] : []),\n      priceDisplay: fmt(p.base), ivaNote, place: p.place,\n      onAdd: (e) => { if (e && e.preventDefault) e.preventDefault(); this.addToCart(p); }\n    }));\n\n    const resultCount = results.length;\n    const resultWord = resultCount === 1 ? \"recambio\" : (hasVehicle ? \"recambios compatibles\" : \"recambios\");\n    const showEmpty = searched && !loading && results.length === 0;\n    const showGrid = !loading && !showEmpty && visibleParts.length > 0;\n    const showDefaultCta = !searched && !loading;\n    const filtersActive = S.filterCat !== \"all\" || S.filterLado !== \"all\";\n\n    let partsEyebrow = \"RECAMBIOS\", partsTitle = \"Piezas destacadas\";\n    if (searched && hasVehicle) { partsEyebrow = \"RESULTADOS\"; partsTitle = \"Compatibles con tu vehículo\"; }\n    else if (searched) { partsEyebrow = \"RESULTADOS\"; partsTitle = \"Recambios\"; }\n\n    let emptyTitle = \"Sin resultados\", emptySub = \"Prueba a quitar algún filtro o cuéntanos qué pieza necesitas.\";\n    if (mode === \"ref\" && rq) { emptyTitle = \"Referencia no encontrada\"; emptySub = \"No tenemos en stock la referencia «\" + (S.refQuery || \"\").trim() + \"». Solicítala y te avisamos en cuanto entre.\"; }\n\n    const ladoDefs = [{ label: \"Todos\", val: \"all\" }, { label: \"Izquierdo\", val: \"izq\" }, { label: \"Derecho\", val: \"der\" }];\n    const ladoOpts = ladoDefs.map((o) => ({\n      label: o.label,\n      set: () => this.setState({ filterLado: o.val }),\n      bg: S.filterLado === o.val ? accent : \"#FFFFFF\",\n      fg: S.filterLado === o.val ? \"#191919\" : \"#6B6B6B\"\n    }));\n\n    const skeletons = [1, 2, 3, 4, 5, 6];\n\n    const confianza = [\n      { icon: \"✓\", t: \"Piezas de vehículos < 6 años\" },\n      { icon: \"✦\", t: \"Garantía 2 años o 40.000 km\" },\n      { icon: \"▣\", t: \"Embalaje y envío premium\" },\n      { icon: \"⚡\", t: \"Envío 24/48h\" },\n      { icon: \"◷\", t: \"Certificados ISO · Granada\" }\n    ];\n    const whyA = [\n      { t: \"Vehículos de menos de 6 años\", s: \"Poco uso y poco kilometraje en cada pieza.\" },\n      { t: \"Cada pieza revisada\", s: \"Comprobada antes de salir del almacén.\" }\n    ];\n    const whyB = [\n      { t: \"Centro autorizado DGT\", s: \"Certificados ISO 9001 e ISO 14001.\" },\n      { t: \"Te ayudamos por WhatsApp\", s: \"Identificamos tu recambio en minutos.\" }\n    ];\n    const vehicles = [\n      { name: \"Porsche 718 Cayman (982)\", specs: [{ k: \"Combustible\", v: \"Gasolina\" }, { k: \"Año\", v: \"2023\" }, { k: \"Ref. VFU\", v: \"12477\" }] },\n      { name: \"Kia Stonic (YB)\", specs: [{ k: \"Kilometraje\", v: \"23.065 km\" }, { k: \"Combustible\", v: \"Gas./eléctrico\" }, { k: \"Año\", v: \"2024\" }] },\n      { name: \"Audi Q3 (8UB, 8UG)\", specs: [{ k: \"Kilometraje\", v: \"88.350 km\" }, { k: \"Combustible\", v: \"Gasolina\" }, { k: \"Año\", v: \"2018\" }] },\n      { name: \"Dacia Sandero III\", specs: [{ k: \"Kilometraje\", v: \"5.296 km\" }, { k: \"Combustible\", v: \"Gasolina/GLP\" }, { k: \"Año\", v: \"2025\" }] }\n    ];\n    const brands = [\"SEAT\", \"RENAULT\", \"OPEL\", \"NISSAN\", \"MERCEDES\", \"BMW\", \"AUDI\", \"VOLKSWAGEN\", \"PEUGEOT\", \"TOYOTA\", \"FORD\", \"HONDA\", \"DACIA\", \"SKODA\", \"VOLVO\", \"MINI\"];\n    const reviews = [\n      { initial: \"M\", name: \"Miguel Ángel H.\", date: \"20/02/2026\", text: \"El pedido ha llegado estupendamente, todo bien embalado. Muy contento, exactamente lo que necesitaba. ¡Gracias!\" },\n      { initial: \"D\", name: \"David Orca\", date: \"21/03/2026\", text: \"Mi primera vez comprando con ellos y no puedo estar más contento. Envío de un día para otro y las piezas parecen nuevas.\" },\n      { initial: \"V\", name: \"Vicente Álvarez\", date: \"18/05/2026\", text: \"Compré un disco de freno usado y queda perfecto, funciona como nuevo. Aquí tenéis un cliente fijo. ¡Un 10!\" }\n    ];\n    const footMap = [\"Inicio\", \"Recambios\", \"Campa\", \"Conócenos\", \"Marcas\", \"Talleres\", \"Preguntas frecuentes\"];\n    const footLegal = [\"Política de privacidad\", \"Aviso legal\", \"Condiciones de uso\", \"Política de cookies\", \"Condiciones de compra\", \"Devoluciones y garantía\"];\n    const socials = [\"IG\", \"TT\", \"YT\", \"FB\"];\n    const certs = [\"ISO 9001\", \"ISO 14001\", \"DGT\", \"AEDRA\", \"SIGRAUTO\", \"Junta de Andalucía\"];\n\n    return {\n      accent, heroSeal, tabs, navpills, marcas, modelos, motores, categories, catNames, chips,\n      confianza, whyA, whyB, vehicles, brands, reviews, footMap, footLegal, socials, certs,\n      isVeh: tab === \"veh\", isRef: tab === \"ref\", isMat: tab === \"mat\",\n\n      marca: S.marca, modelo: S.modelo, motor: S.motor, pieza: S.pieza,\n      onMarca: (e) => this.setState({ marca: e.target.value }),\n      onModelo: (e) => this.setState({ modelo: e.target.value }),\n      onMotor: (e) => this.setState({ motor: e.target.value }),\n      onPieza: (e) => this.setState({ pieza: e.target.value }),\n      searchVehiculo: () => this.searchVehiculo(),\n      refQuery: S.refQuery, onRef: (e) => this.setState({ refQuery: e.target.value }),\n      onRefKey: (e) => { if (e.key === \"Enter\") this.searchRef(); },\n      searchRef: () => this.searchRef(),\n      plate: S.plate, onPlate: (e) => this.setState({ plate: e.target.value }),\n      identifyPlate: () => this.identifyPlate(),\n      query: S.query, onQuery: (e) => this.setState({ query: e.target.value }),\n      onQueryKey: (e) => { if (e.key === \"Enter\") this.searchHeader(); },\n      searchHeader: () => this.searchHeader(),\n\n      searched, loading, hasVehicle, activeVehicle: S.activeVehicle,\n      partsEyebrow, partsTitle, resultCount, resultWord,\n      visibleParts, skeletons, showEmpty, showGrid, showDefaultCta, emptyTitle, emptySub,\n      ladoOpts, filterCat: S.filterCat, onFilterCat: (e) => this.setState({ filterCat: e.target.value }),\n      sort: S.sort, onSort: (e) => this.setState({ sort: e.target.value }),\n      filtersActive, resetFilters: () => this.resetFilters(),\n      clearVehicle: () => this.clearVehicle(),\n      verCatalogo: (e) => { if (e && e.preventDefault) e.preventDefault(); this.searchAll(); },\n      solicitarPieza: () => this.flash(\"Te llamamos para localizar tu pieza 📞\"),\n\n      cart: S.cart,\n      cartClick: (e) => { if (e && e.preventDefault) e.preventDefault(); this.flash(S.cart > 0 ? (\"Tienes \" + S.cart + \" artículo\" + (S.cart > 1 ? \"s\" : \"\") + \" en el carrito\") : \"Tu carrito está vacío\"); },\n      toast: S.toast,\n      ivaLabel: S.sinIva ? \"PRECIOS SIN IVA\" : \"PRECIOS CON IVA\",\n      toggleIva: () => this.setState((s) => ({ sinIva: !s.sinIva }))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
